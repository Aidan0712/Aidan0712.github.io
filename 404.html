<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - 页面未找到 - Aidan 的博客</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      color: white;
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 144, 217, 0.4);
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="text-center">
    <h1 style="font-size: 6rem; color: #4a90d9; margin-bottom: 1rem;">404</h1>
    <h2 style="font-size: 2rem; color: #ffffff; margin-bottom: 1rem;">页面未找到</h2>
    <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 2rem;">抱歉，您访问的页面不存在或已被移动。</p>
    <a href="/" class="btn-primary">返回首页</a>
