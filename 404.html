<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - 页面未找到 - Aidan 的博客</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a0a0a 0%, #2a0f0f 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-weight: 600;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 71, 87, 0.6);
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="text-center">
    <h1 style="font-size: 8rem; color: #ff4757; margin-bottom: 1rem; text-shadow: 0 0 30px #ff4757;">🔥 404</h1>
    <h2 style="font-size: 2rem; color: #ffffff; margin-bottom: 1rem;">页面未找到</h2>
    <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 2rem;">抱歉，您访问的页面不存在或已被移动。🎸</p>
    <a href="/" class="btn-primary">🏠 返回首页</a>
  </div>
</body>
</html>
